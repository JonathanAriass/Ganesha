name: Release

# Build the macOS app and publish a GitHub Release whenever a v* tag is pushed.
#
# Apple Silicon (arm64) only. Intel was dropped: GitHub retired the macos-13 Intel
# runner, and its replacement (macos-15-intel) can't package the app reliably
# (hdiutil "Resource busy"). The app ships as a zip (no disk image to mount/detach).
# To re-add Intel, put the macos-15-intel leg back in the matrix and restore the
# x64 arch to the cask (homebrew-tap: Casks/ganesha.rb + update-cask.yml).
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14 # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Install dependencies
        run: npm ci

      - name: Set the version from the tag (v1.2.3 -> 1.2.3)
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build + package the ${{ matrix.arch }} app
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # electron-builder auto-publishes in CI when GH_TOKEN is set — we publish in
          # the separate `release` job instead, so GH_TOKEN stays unset and we build
          # with `--publish never`.
          #
          # ── Sign + notarize later (when an Apple Developer account is available) ──
          # Add these as repository Actions secrets, then uncomment:
          # CSC_LINK: ${{ secrets.CSC_LINK }}                              # base64 of the Developer ID .p12
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run build
          npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload the app zip
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Release and attach the zips
    steps:
      - name: Download both zips
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create / update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber artifacts/*.zip
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              artifacts/*.zip
          fi
