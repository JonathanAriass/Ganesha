appId: com.jonathanariass.dbclient
productName: Ganesha
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# Native modules must live outside the asar so their .node/.dylib/.metallib can be
# dlopen'd at runtime. electron-builder smart-unpacks .node files; node-llama-cpp also
# ships separate llama.cpp libraries, so unpack the whole package + its bin packages.
asarUnpack:
  - "**/node_modules/node-llama-cpp/**"
  - "**/node_modules/@node-llama-cpp/**"
# Ship the `ganesha` CLI launcher inside the bundle (→ Ganesha.app/Contents/Resources/ganesha).
# The Homebrew cask symlinks it onto the user's PATH with a `binary` stanza so `ganesha` opens
# the app from a terminal.
extraResources:
  - from: bin/ganesha
    to: ganesha
mac:
  # zip, not dmg: on the macos-15-intel runner electron-builder's dmg finalize step
  # (`hdiutil detach`) reliably fails with "Resource busy", and macos-13 (the old Intel
  # image) is retired. zip never mounts a disk image, so it can't hit that. Homebrew
  # installs a zipped .app exactly like a dmg, so the cask UX is unchanged.
  target: zip
  category: public.app-category.developer-tools
  # Names each build what the release + Homebrew cask expect: Ganesha-<version>-arm64.zip / -x64.zip
  artifactName: ${productName}-${version}-${arch}.zip
  # ── Sign + notarize later (when an Apple Developer account is available) ──
  #  1. Add repo Actions secrets: CSC_LINK (base64 Developer ID .p12), CSC_KEY_PASSWORD,
  #     APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID.
  #  2. Uncomment the matching env lines in .github/workflows/release.yml.
  #  3. Uncomment the four lines below, then drop the Gatekeeper caveat from the
  #     Homebrew cask (homebrew-tap repo: Casks/ganesha.rb).
  # hardenedRuntime: true
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist
  # notarize: true
publish:
  provider: github
  owner: JonathanAriass
  repo: Ganesha
win:
  target: nsis
linux:
  target:
    - AppImage
    - deb
  category: Development
